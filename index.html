<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reading 100 Library</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <header class="site-header">
    <h1>Reading 100 Library</h1>
    <p class="subtitle">Click a book to start reading. Finished books turn red.</p>
  </header>
  <section class="toolbar">
    <input id="search" class="search" type="search" placeholder="Search books..." aria-label="Search books" />
    <span id="count" class="count" aria-live="polite"></span>
  </section>

  <main id="books" class="books-grid" aria-live="polite"></main>

  <footer class="site-footer">
    <small>This is a static site and can run on GitHub Pages.</small>
  </footer>

  <script src="library/library.js"></script>
  <script src="assets/js/storage.js"></script>
  <script src="assets/js/books.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
